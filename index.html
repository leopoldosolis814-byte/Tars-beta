<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TARS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* VIDEO FULL */
video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SCANLINES */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanMove 6s linear infinite;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(12px); }
}

/* TEXTO CYBERPUNK PRO */
.text {
  position: fixed;
  bottom: 6vh;
  left: 50%;
  transform: translateX(-50%);
  color: #00ffe1;
  font-family: "Courier New", monospace;
  font-size: clamp(20px, 5vw, 36px);
  letter-spacing: 3px;
  text-shadow:
    0 0 5px #00ffe1,
    0 0 10px #00ffe1,
    0 0 20px #00ffe1;
  white-space: nowrap;
}

/* CURSOR */
.cursor {
  display: inline-block;
  width: 10px;
  margin-left: 5px;
  background: #00ffe1;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* GLITCH */
.glitch {
  position: fixed;
  inset: 0;
  background: rgba(0,255,255,0.08);
  opacity: 0;
  pointer-events: none;
}

.glitch.active {
  animation: glitchFlash 0.15s;
}

@keyframes glitchFlash {
  50% { opacity: 1; }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/q_auto,f_auto/v1777542938/futuristic_ultra_realistic_female_android_executive_secretary_human-like_android_elegant_and_precis_0x9zlg1mk8g25oluka91_1_ofn8ro.mp4">
</video>

<div class="scanlines"></div>
<div class="glitch" id="glitch"></div>

<div class="text">
  <span id="typed"></span><span class="cursor"></span>
</div>

<script>
const typed = document.getElementById("typed");
const glitch = document.getElementById("glitch");

const frase = "Hola... ¿cómo estás? Soy TARS, tu asistente.";

// TYPEWRITER PRO
function escribir(texto, speed = 45) {
  typed.textContent = "";
  let i = 0;

  const interval = setInterval(() => {
    typed.textContent += texto[i];
    i++;
    if (i >= texto.length) clearInterval(interval);
  }, speed);
}

// AUDIO ENGINE
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// HUM BASE
let humOsc, humGain;

function startHum() {
  humOsc = ctx.createOscillator();
  humGain = ctx.createGain();

  humOsc.type = "sawtooth";
  humOsc.frequency.value = 50;

  humGain.gain.value = 0.02;

  humOsc.connect(humGain);
  humGain.connect(ctx.destination);

  humOsc.start();
}

// DELAY (eco robótico)
function createDelay() {
  const delay = ctx.createDelay();
  delay.delayTime.value = 0.25;

  const feedback = ctx.createGain();
  feedback.gain.value = 0.4;

  delay.connect(feedback);
  feedback.connect(delay);

  return delay;
}

// VOZ ROBÓTICA MEJORADA
function hablar(texto) {
  const msg = new SpeechSynthesisUtterance(texto);

  msg.rate = 0.8;
  msg.pitch = 0.3;

  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang.includes("es"));
  if (voice) msg.voice = voice;

  speechSynthesis.speak(msg);
}

// VOCODER MÁS INTENSO
function vocoder() {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  const delay = createDelay();

  osc.type = "square";
  osc.frequency.value = 90;

  filter.type = "bandpass";
  filter.frequency.value = 700;

  gain.gain.value = 0.04;

  osc.connect(filter);
  filter.connect(delay);
  delay.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 2);
}

// ACTIVACIÓN
document.body.addEventListener("click", () => {
  ctx.resume();

  startHum();
  escribir(frase);
  hablar(frase);
  vocoder();

}, { once: true });

// GLITCH LOOP
setInterval(() => {
  glitch.classList.add("active");
  setTimeout(() => glitch.classList.remove("active"), 150);
}, 6000);

</script>

</body>
</html>
