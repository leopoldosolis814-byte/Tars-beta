<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lady TARS</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* VIDEO FULLSCREEN */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* SCANLINES */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: moveScan 6s linear infinite;
}

@keyframes moveScan {
  from { transform: translateY(0); }
  to { transform: translateY(10px); }
}

/* GLITCH */
.glitch {
  position: fixed;
  inset: 0;
  background: rgba(0,255,255,0.08);
  opacity: 0;
  pointer-events: none;
}

.glitch.active {
  animation: glitchFlash 0.15s;
}

@keyframes glitchFlash {
  50% { opacity: 1; }
}
</style>

</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/q_auto,f_auto/v1777542938/futuristic_ultra_realistic_female_android_executive_secretary_human-like_android_elegant_and_precis_0x9zlg1mk8g25oluka91_1_ofn8ro.mp4">
</video>

<!-- EFECTOS -->
<div class="scanlines"></div>
<div class="glitch" id="glitch"></div>

<script>
// AUDIO ENGINE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// HUM (ambiente)
let humOsc, humGain;

function startHum() {
  humOsc = audioCtx.createOscillator();
  humGain = audioCtx.createGain();

  humOsc.type = "sawtooth";
  humOsc.frequency.setValueAtTime(55, audioCtx.currentTime);

  humGain.gain.setValueAtTime(0.03, audioCtx.currentTime);

  humOsc.connect(humGain);
  humGain.connect(audioCtx.destination);

  humOsc.start();
}

// BEEP futurista
function beep() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(900, audioCtx.currentTime);

  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

// VOZ
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  msg.pitch = 0.6;

  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.name.includes("Google") || v.name.includes("Microsoft"));
  if (voice) msg.voice = voice;

  speechSynthesis.speak(msg);
}

// ACTIVAR AUDIO (click obligatorio)
document.body.addEventListener("click", () => {
  audioCtx.resume();
  startHum();
  speak("System online");
}, { once: true });

// LOOP NARRATIVO
const glitch = document.getElementById("glitch");

const frases = [
  "Awaiting command",
  "Processing request",
  "System active",
  "Analyzing",
  "Ready"
];

let contador = 0;

setInterval(() => {

  contador++;

  // glitch
  glitch.classList.add("active");
  setTimeout(() => glitch.classList.remove("active"), 150);

  // beep
  beep();

  // voz cada 3 ciclos
  if (contador % 3 === 0) {
    const frase = frases[Math.floor(Math.random() * frases.length)];
    speak(frase);
  }

}, 6000);
</script>

</body>
</html>
