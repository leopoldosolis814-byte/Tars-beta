<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TARS-1</title>

<style>
body {
  margin: 0;
  background: #05080f;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
}

/* CONTENEDOR */
.wrapper {
  width: 100%;
  max-width: 420px;
  padding: 16px;
  box-sizing: border-box;
}

/* TITULO */
.title {
  color: #dff;
  font-size: clamp(24px, 6vw, 38px);
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 20px;
}

/* CARD */
.card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  border: 2px solid rgba(0,255,255,0.3);
  box-shadow: 0 0 25px rgba(0,255,255,0.2);
}

/* VIDEO */
video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;
}

/* SCANLINES */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.06) 0px,
    rgba(255,255,255,0.06) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  animation: scanMove 5s linear infinite;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(12px); }
}

/* HUD */
.hud {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  color: #00ffe1;
  backdrop-filter: blur(6px);
}

/* PANEL */
.panel {
  margin-top: 20px;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(0,255,255,0.2);
  color: #0ff;
}

/* RESPONSIVE EXTRA */
@media (max-width: 400px) {
  .wrapper {
    padding: 10px;
  }
}
</style>

</head>

<body>

<div class="wrapper">

  <div class="title">
    TARS-1<br>BUSINESS AI
  </div>

  <div class="card">

    <!-- 🔥 TU VIDEO -->
    <video autoplay muted loop playsinline>
      <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/q_auto,f_auto/v1777542938/futuristic_ultra_realistic_female_android_executive_secretary_human-like_android_elegant_and_precis_0x9zlg1mk8g25oluka91_1_ofn8ro.mp4">
    </video>

    <!-- HUD -->
    <div class="hud">
      CPU: 15%<br>
      DATA STREAMS: 0<br>
      CONFIDENCE: 94%
    </div>

  </div>

  <div class="panel">
    ● FASE 1: CAPTURA DE DATOS
  </div>

</div>

</body>
</html>
