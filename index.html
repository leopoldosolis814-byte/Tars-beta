<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TARS-1 Business Assistance - Simulator</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #tars-container { position: relative; width: 600px; height: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 162, 255, 0.2); border: 1px solid #333; }
        
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease-in-out; }
        video.active { opacity: 1; }

        .overlay-data { position: absolute; top: 20px; right: 20px; width: 200px; z-index: 10; pointer-events: none; }
        .data-card { background: rgba(0, 0, 0, 0.7); border-left: 3px solid #00a2ff; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 12px; transform: translateX(250px); transition: 0.5s; }
        .data-card.show { transform: translateX(0); }

        #controls { margin-top: 30px; z-index: 20; }
        button { background: #00a2ff; border: none; padding: 15px 30px; color: white; font-weight: bold; border-radius: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #00c3ff; transform: scale(1.05); }
        
        #status-text { margin-top: 15px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div id="tars-container">
        <video id="v-idle" class="active" autoplay loop muted playsinline>
            <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1777065309/prompt-_a_seamless_6-second_loop_of_the_sophisticated_male_android_from_the_reference_image_sitting_fjcb6d5iml6kxgjasezb_1_bq3oot.mp4" type="video/mp4">
        </video>
        
        <video id="v-thinking" loop muted playsinline>
            <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1777065319/prompt-_a_seamless_6-second_loop_of_the_sophisticated_male_android_maintaining_the_same_pose_the_fo_ttwfzbj7a7s4i5xddmdr_1_azz16f.mp4" type="video/mp4">
        </video>

        <video id="v-speaking" loop muted playsinline>
            <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1777065311/prompt-_a_seamless_6-second_loop_of_the_sophisticated_male_android_speaking_authoritatively_there_i_yt08l0epi3xlms2yzohv_1_y4x0tb.mp4" type="video/mp4">
        </video>

        <div class="overlay-data">
            <div id="card-1" class="data-card"><b>r/Reddit:</b> "Necesito viandas para gaming que no ensucien..."</div>
            <div id="card-2" class="data-card"><b>Quora:</b> "¿Comida sana en 5 min?"</div>
            <div id="card-3" class="data-card"><b>X Trend:</b> #HealthyGamer (+25%)</div>
        </div>
    </div>

    <div id="controls">
        <button onclick="startSimulation()">Simular Validación</button>
    </div>
    <div id="status-text">TARS-1 en línea. Esperando idea...</div>

    <script>
        function switchVideo(activeId) {
            document.querySelectorAll('video').forEach(v => {
                v.classList.remove('active');
                v.pause();
            });
            const active = document.getElementById(activeId);
            active.classList.add('active');
            active.play();
        }

        function startSimulation() {
            const status = document.getElementById('status-text');
            
            // 1. Fase Pensar
            status.innerText = "TARS está procesando datos de Reddit y Twitter...";
            switchVideo('v-thinking');

            // 2. Fase Hablar (A los 3 segundos)
            setTimeout(() => {
                status.innerText = "TARS reportando hallazgos...";
                switchVideo('v-speaking');
                
                // Mostrar "Capturas" una por una
                setTimeout(() => document.getElementById('card-1').classList.add('show'), 500);
                setTimeout(() => document.getElementById('card-2').classList.add('show'), 1500);
                setTimeout(() => document.getElementById('card-3').classList.add('show'), 2500);
            }, 3000);

            // 3. Volver a Reposo (A los 10 segundos)
            setTimeout(() => {
                status.innerText = "Análisis finalizado. Listo para el siguiente paso.";
                switchVideo('v-idle');
                // Limpiar cards para reiniciar
                document.querySelectorAll('.data-card').forEach(c => c.classList.remove('show'));
            }, 10000);
        }
    </script>
</body>
                                                                                                                   </html>
