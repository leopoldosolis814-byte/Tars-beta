<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TARS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* VIDEO FULLSCREEN REAL */
video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SCANLINES */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanMove 6s linear infinite;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to { transform: translateY(12px); }
}

/* TEXTO CYBERPUNK */
.text {
  position: fixed;
  bottom: 5vh;
  left: 50%;
  transform: translateX(-50%);
  color: #00ffe1;
  font-family: monospace;
  font-size: clamp(14px, 3.5vw, 22px);
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00ffe1;
  white-space: nowrap;
}

/* GLITCH FLASH */
.glitch {
  position: fixed;
  inset: 0;
  background: rgba(0,255,255,0.08);
  opacity: 0;
  pointer-events: none;
}

.glitch.active {
  animation: glitchFlash 0.15s;
}

@keyframes glitchFlash {
  50% { opacity: 1; }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/q_auto,f_auto/v1777542938/futuristic_ultra_realistic_female_android_executive_secretary_human-like_android_elegant_and_precis_0x9zlg1mk8g25oluka91_1_ofn8ro.mp4">
</video>

<div class="scanlines"></div>
<div class="glitch" id="glitch"></div>
<div class="text" id="text"></div>

<script>
const textEl = document.getElementById("text");
const glitch = document.getElementById("glitch");

const frase = "Hola... ¿cómo estás? Soy TARS, tu asistente.";

// TYPEWRITER
function escribir(texto, speed = 50) {
  textEl.textContent = "";
  let i = 0;
  const interval = setInterval(() => {
    textEl.textContent += texto[i];
    i++;
    if (i >= texto.length) clearInterval(interval);
  }, speed);
}

// AUDIO CONTEXT
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// VOCODER SIMPLE (efecto robótico)
function vozRobotica() {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  osc.type = "sawtooth";
  osc.frequency.value = 110; // grave

  filter.type = "bandpass";
  filter.frequency.value = 800;

  gain.gain.value = 0.05;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 2);
}

// VOZ TTS GRAVE
function hablar(texto) {
  const msg = new SpeechSynthesisUtterance(texto);
  msg.rate = 0.85;
  msg.pitch = 0.4; // más grave

  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang.includes("es"));
  if (voice) msg.voice = voice;

  speechSynthesis.speak(msg);
}

// ACTIVACIÓN
document.body.addEventListener("click", () => {
  ctx.resume();

  escribir(frase, 45);
  hablar(frase);
  vozRobotica();

}, { once: true });

// LOOP EFECTO
setInterval(() => {
  glitch.classList.add("active");
  setTimeout(() => glitch.classList.remove("active"), 150);
}, 6000);

</script>

</body>
</html>
